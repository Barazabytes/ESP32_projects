<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-grid"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <main class="card-wrapper">
    <div class="card">

      <div class="card-header">
        <div class="logo-mark">✦</div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to continue where you left off.</p>
      </div>

      <form class="form" id="signin-form" novalidate>

        <div class="field">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
              </svg>
            </span>
            <input type="text" id="username" name="username" placeholder="Your username"
              autocomplete="username" required />
          </div>
          <span class="field-error" id="username-error"></span>
        </div>

        <div class="field">
          <div class="label-row">
            <label for="password">Password</label>
          </div>
          <div class="input-wrap">
            <span class="icon">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
              </svg>
            </span>
            <input type="password" id="password" name="password" placeholder="Your password"
              autocomplete="current-password" required />
            <button type="button" class="toggle-pw" aria-label="Toggle password visibility" onclick="togglePassword()">
              <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <span class="field-error" id="password-error"></span>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
          <span id="btn-label">Sign In</span>
          <svg id="btn-arrow" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
          <!-- Spinner (hidden by default) -->
          <svg id="btn-spinner" class="spinner hidden" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
            stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
        </button>

      </form>

      <p class="login-link">Don't have an account? <a href="index.html">Register</a></p>

    </div>
  </main>

  <script>
    /* ── Toggle password visibility ── */
    function togglePassword() {
      const input = document.getElementById('password');
      const icon  = document.getElementById('eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
          <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
          <line x1="1" y1="1" x2="23" y2="23"/>`;
      } else {
        input.type = 'password';
        icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
      }
    }

    /* ── Inline validation helpers ── */
    function setError(fieldId, msg) {
      const el = document.getElementById(fieldId + '-error');
      const input = document.getElementById(fieldId);
      if (el) { el.textContent = msg; }
      if (input) { input.classList.toggle('input-invalid', !!msg); }
    }
    function clearErrors() {
      ['username', 'password'].forEach(id => setError(id, ''));
      document.getElementById('error-banner').classList.remove('visible');
    }

    /* ── Live clear on typing ── */
    ['username', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => setError(id, ''));
    });

    /* ── Form submit ── */
    document.getElementById('signin-form').addEventListener('submit', function (e) {
      e.preventDefault();
      clearErrors();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      let valid = true;

      if (!username) {
        setError('username', 'Please enter your username.');
        valid = false;
      }
      if (!password) {
        setError('password', 'Please enter your password.');
        valid = false;
      }
      if (!valid) return;

      /* Simulate async sign-in */
      const btn    = document.getElementById('submit-btn');
      const label  = document.getElementById('btn-label');
      const arrow  = document.getElementById('btn-arrow');
      const spinner = document.getElementById('btn-spinner');

      btn.disabled = true;
      label.textContent = 'Signing in…';
      arrow.classList.add('hidden');
      spinner.classList.remove('hidden');

      setTimeout(() => {
        btn.disabled = false;
        label.textContent = 'Sign In';
        arrow.classList.remove('hidden');
        spinner.classList.add('hidden');

        /* Demo: show error banner to illustrate the state */
        document.getElementById('error-banner').classList.add('visible');
      }, 1800);
    });
  </script>

</body>
</html>
