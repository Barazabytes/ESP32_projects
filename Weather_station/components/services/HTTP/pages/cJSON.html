<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather station</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0b0f1a;
      --surface: #111827;
      --border: #1e2d40;
      --accent-hot: #ff6b35;
      --accent-cool: #38bdf8;
      --accent-humid: #34d399;
      --text-primary: #f1f5f9;
      --text-muted: #64748b;
      --glow-hot: rgba(255, 107, 53, 0.25);
      --glow-cool: rgba(56, 189, 248, 0.25);
      --glow-humid: rgba(52, 211, 153, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text-primary);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow-x: hidden;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: 0.4;
      pointer-events: none;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    header .label {
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, var(--accent-cool) 0%, var(--accent-humid) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .location {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.4rem;
    }

    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      width: 100%;
      max-width: 900px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      animation: fadeUp 0.6s ease both;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 180px; height: 180px;
      border-radius: 50%;
      filter: blur(60px);
      pointer-events: none;
      transition: opacity 0.4s;
    }

    .card.temp-hot::before  { background: var(--glow-hot); }
    .card.temp-cool::before { background: var(--glow-cool); }
    .card.humidity::before  { background: var(--glow-humid); }

    .card:hover::before { opacity: 1.5; }

    .card.temp-hot  { box-shadow: 0 0 30px var(--glow-hot); border-color: rgba(255,107,53,0.3); }
    .card.temp-cool { box-shadow: 0 0 30px var(--glow-cool); border-color: rgba(56,189,248,0.3); }
    .card.humidity  { box-shadow: 0 0 30px var(--glow-humid); border-color: rgba(52,211,153,0.3); }

    .card-icon {
      font-size: 1.6rem;
      margin-bottom: 1rem;
    }

    .card-label {
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .card-value {
      font-family: 'Syne', sans-serif;
      font-size: 4rem;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .card.temp-hot  .card-value { color: var(--accent-hot); }
    .card.temp-cool .card-value { color: var(--accent-cool); }
    .card.humidity  .card-value { color: var(--accent-humid); }

    .card-unit {
      font-family: 'Space Mono', monospace;
      font-size: 1.2rem;
      font-weight: 400;
      opacity: 0.6;
      margin-left: 4px;
    }

    .card-description {
      margin-top: 1.2rem;
      font-size: 0.72rem;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* Bar gauge */
    .gauge-track {
      margin-top: 1.4rem;
      height: 4px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .gauge-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 1.2s cubic-bezier(0.23, 1, 0.32, 1);
    }

    .card.temp-hot  .gauge-fill { background: var(--accent-hot); }
    .card.temp-cool .gauge-fill { background: var(--accent-cool); }
    .card.humidity  .gauge-fill { background: var(--accent-humid); }

    /* Toggle unit button */
    .toggle-btn {
      position: absolute;
      top: 1.2rem; right: 1.2rem;
      background: var(--border);
      border: none;
      color: var(--text-muted);
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.1em;
      transition: background 0.2s, color 0.2s;
    }
    .toggle-btn:hover {
      background: rgba(56,189,248,0.2);
      color: var(--accent-cool);
    }

    /* Bottom row cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      width: 100%;
      max-width: 900px;
      margin-top: 1.5rem;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .stat-mini {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .stat-mini .s-label {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    .stat-mini .s-value {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-primary);
    }

    .stat-mini .s-change {
      font-size: 0.65rem;
      color: var(--text-muted);
    }

    .up   { color: var(--accent-hot) !important; }
    .down { color: var(--accent-cool) !important; }

    footer {
      margin-top: 2.5rem;
      font-size: 0.62rem;
      letter-spacing: 0.15em;
      color: var(--text-muted);
      text-transform: uppercase;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(1) { animation-delay: 0.05s; }
    .card:nth-child(2) { animation-delay: 0.15s; }
    .card:nth-child(3) { animation-delay: 0.25s; }

    /* Blink dot */
    .live-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent-humid);
      margin-right: 6px;
      animation: blink 1.4s infinite;
      vertical-align: middle;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }
  </style>
</head>
<body>

  <header>
    <p class="label">ByteLink</p>
    <h1>Weather Dashboard</h1>
    <p class="location"><span class="live-dot"></span>Live · From · Station - 1 </p>
  </header>

  <div class="dashboard">

    <!-- Temperature Card -->
    <div class="card temp-hot" id="tempCard">
      <button class="toggle-btn" onclick="toggleUnit()">°C / °F</button>
      <div class="card-icon">🌡️</div>
      <div class="card-label">Temperature</div>
      <div class="card-value" id="tempValue">--.-<span class="card-unit" id="tempUnit">°C</span></div>
      <div class="gauge-track">
        <div class="gauge-fill" id="tempGauge" style="width: 64%"></div>
      </div>
    </div>

    <!-- Humidity Card -->
    <div class="card humidity">
      <div class="card-icon">💧</div>
      <div class="card-label">Humidity</div>
      <div class="card-value" id="humidValue">--.-<span class="card-unit">%</span></div>
      <div class="gauge-track">
        <div class="gauge-fill" id="humidGauge" style="width: 78%"></div>
      </div>
    </div>

  </div>

  <footer>Last updated: <span id="lastUpdate"></span></footer>

  <script>

    let TempG = 0;
    let HumG = 0;


    // Set last updated time
    function updateTime() {
      const now = new Date();
      document.getElementById('lastUpdate').textContent =
        now.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    updateTime();
    setInterval(updateTime, 1000);

    // For Pushing Data to the Browser from ESP32

    async function updateData() {
        try {
            const response = await fetch('/json_data');
            const data = await response.json();
            
            // Inserting data into the HTML
            document.getElementById('tempValue').innerText = data.temperature;
            document.getElementById('humidValue').innerText = data.humidity;

            // Update Data for Gauges
            TempG = data.temperature;
            HumG  = data.humidity;

        } catch (err) {
            console.error("Connection lost:", err);
        }
    }

    // Poll every 2 seconds
    setInterval(updateData, 2000);
    updateData(); // Initial call


    // Unit toggle: Celsius ↔ Fahrenheit
    let isCelsius = true;
    const tempC = 32;

    function toggleUnit() {
      isCelsius = !isCelsius;
      const val = isCelsius ? TempG : Math.round((TempG * 9)/5 + tempC);
      const unit = isCelsius ? '°C' : '°F';
      document.getElementById('tempValue').innerHTML = `${val}<span class="card-unit" id="tempUnit">${unit}</span>`;

      // Swap card colour class
      const card = document.getElementById('tempCard');
      card.classList.toggle('temp-hot', isCelsius);
      card.classList.toggle('temp-cool', !isCelsius);
    }

    // Animate gauges on load
    window.addEventListener('load', () => {
      setTimeout(() => {
        document.getElementById('tempGauge').style.width  = TempG;
        document.getElementById('humidGauge').style.width = HumG;
      }, 300);
    });

  </script>

</body>
</html>
